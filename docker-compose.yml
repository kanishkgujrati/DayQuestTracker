services:

  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: dayquest_postgres
    environment:
      POSTGRES_DB: DayQuestTracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"  # Map to 5433 locally to avoid conflict with your local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # DayQuestTracker API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dayquest_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=DayQuestTracker;Username=postgres;Password=postgres
      - JwtSettings__Secret=YOUR_SUPER_SECRET_KEY_MINIMUM_32_CHARACTERS_LONG
      - JwtSettings__Issuer=DayQuestTracker
      - JwtSettings__Audience=DayQuestTrackerUsers
      - JwtSettings__AccessTokenExpiryMinutes=15
      - JwtSettings__RefreshTokenExpiryDays=7
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
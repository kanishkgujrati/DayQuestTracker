services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    restart: unless-stopped
    networks:
      - dayquest-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # DayQuestTracker API
  api:
    build:
      context: .
      dockerfile: DayQuestTracker_Server/DayQuestTracker.WebAPI/Dockerfile
    ports:
      - "8080:8080"
    networks:
      - dayquest-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=DayQuestTracker;Username=postgres;Password=postgres
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=DayQuestTracker
      - JwtSettings__Audience=DayQuestTrackerUsers
      - JwtSettings__AccessTokenExpiryMinutes=15
      - JwtSettings__RefreshTokenExpiryDays=7
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:

networks:
  dayquest-network:

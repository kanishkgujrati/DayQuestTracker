<div class="flex min-h-screen bg-slate-900">
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col fixed h-full">
    <!-- Logo -->
    <div class="p-6 border-b border-slate-700">
      <h1 class="text-2xl font-bold text-white">DayQuest</h1>
      <p class="text-slate-400 text-xs mt-1">Level up your life</p>
    </div>

    <!-- User XP Card -->
    @if (user$ | async; as user) {
      <div class="p-4 border-b border-slate-700">
        <div class="flex items-center gap-3 mb-3">
          <div
            class="w-10 h-10 rounded-full bg-sky-600 flex items-center justify-center text-white font-bold text-sm"
          >
            {{ user.username[0].toUpperCase() }}
          </div>
          <div>
            <p class="text-white font-medium text-sm">{{ user.username }}</p>
            <p class="text-slate-400 text-xs">Level {{ user.level }}</p>
          </div>
        </div>

        <!-- XP Progress Bar -->
        @if (xp$ | async; as xp) {
          <div>
            <div class="flex justify-between text-xs text-slate-400 mb-1">
              <span>{{ xp }} XP</span>
              <span>{{ xpForNextLevel(xp) }} XP</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-1.5">
              <div
                class="bg-sky-500 h-1.5 rounded-full transition-all duration-500"
                [style.width.%]="xpProgress(xp)"
              ></div>
            </div>
          </div>
        }
      </div>
    }

    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-sky-600 text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition text-sm font-medium"
        >
          <span>{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Logout -->
    <div class="p-4 border-t border-slate-700">
      <button
        (click)="onLogout()"
        class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-red-500/10 hover:text-red-400 transition text-sm font-medium"
      >
        <span>🚪</span>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-64 flex-1 overflow-auto">
    <router-outlet />
  </main>
</div>

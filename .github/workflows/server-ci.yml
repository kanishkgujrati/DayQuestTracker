name: Server CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: DayQuestTrackerTest
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore
        working-directory: DayQuestTracker_Server

      - name: Build solution
        run: dotnet build --no-restore --configuration Release
        working-directory: DayQuestTracker_Server

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: DayQuestTracker_Server
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION }}
          JwtSettings__Secret: ${{ secrets.JWT_SECRET }}
          JwtSettings__Issuer: DayQuestTracker
          JwtSettings__Audience: DayQuestTrackerUsers
          JwtSettings__AccessTokenExpiryMinutes: 15
          JwtSettings__RefreshTokenExpiryDays: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dayquesttracker:latest -f DayQuestTracker_Server/DayQuestTracker.WebAPI/Dockerfile .

      - name: Verify Docker image
        run: docker images dayquesttracker
